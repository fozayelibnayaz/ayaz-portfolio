[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/cv"
  to = "/.netlify/functions/cv"
  status = 200

[[redirects]]
  from = "/server/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/api/*.js"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
