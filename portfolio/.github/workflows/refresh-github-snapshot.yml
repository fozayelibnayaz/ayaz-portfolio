name: Refresh GitHub snapshot

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh public GitHub data
        env:
          GITHUB_USERNAME: fozayelibnayaz
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-github-snapshot.mjs

      - name: Commit changes if needed
        run: |
          if [[ -n "$(git status --porcelain data/github-snapshot.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/github-snapshot.json
            git commit -m "Refresh GitHub portfolio snapshot"
            git push
          else
            echo "No snapshot changes."
          fi
